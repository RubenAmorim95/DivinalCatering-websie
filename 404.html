<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Divinal Catering</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-dark: #0F0E0C;
      --gold: #B8973A;
      --border: rgba(184,151,58,0.2);
    }
    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      background: var(--bg-dark);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: pageIn 0.6s ease 0.1s forwards;
    }
    @keyframes pageIn { to { opacity: 1; } }
    a { text-decoration: none; color: inherit; }

    /* NAV */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 48px; height: 72px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 400; color: rgba(255,255,255,0.7);
      letter-spacing: 1px;
    }
    .nav-logo span { color: var(--gold); margin: 0 6px; }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
      position: relative;
    }

    /* Decorative background number */
    .not-found-bg {
      position: absolute;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(180px, 30vw, 380px);
      font-weight: 300;
      color: rgba(184,151,58,0.04);
      line-height: 1;
      user-select: none;
      pointer-events: none;
      letter-spacing: -0.04em;
    }

    .not-found-content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .eyebrow {
      font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--gold); font-weight: 500; margin-bottom: 20px;
      opacity: 0; animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
    }

    .not-found-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 8vw, 100px);
      font-weight: 300; line-height: 1;
      color: #fff; margin-bottom: 6px;
      opacity: 0; animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.55s forwards;
    }

    .gold-line {
      width: 0; height: 1px; background: var(--gold);
      margin: 24px auto 28px;
      animation: lineGrow 0.8s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
    }
    @keyframes lineGrow { to { width: 80px; } }

    .not-found-sub {
      font-size: 13px; color: rgba(255,255,255,0.45);
      letter-spacing: 0.5px; max-width: 340px; line-height: 1.8;
      margin-bottom: 40px;
      opacity: 0; animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 1.0s forwards;
    }

    .btn-back {
      font-family: 'Jost', sans-serif; font-size: 10px; font-weight: 400;
      letter-spacing: 2px; text-transform: uppercase; padding: 13px 32px;
      border: 1px solid var(--gold); color: var(--gold);
      transition: background 0.3s; display: inline-block;
      opacity: 0; animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 1.1s forwards;
    }
    .btn-back:hover { background: rgba(184,151,58,0.08); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* FOOTER */
    footer {
      padding: 20px 48px;
      border-top: 1px solid rgba(184,151,58,0.1);
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 0.5px;
    }
    footer a { color: rgba(255,255,255,0.35); transition: color 0.2s; }
    footer a:hover { color: var(--gold); }

    @media (max-width: 768px) {
      .nav { padding: 0 24px; }
      footer { padding: 16px 24px; flex-direction: column; gap: 8px; text-align: center; }
    }
  </style>
</head>
<body>

<nav class="nav" aria-label="Navegação principal">
  <a href="index.html" class="nav-logo">Divinal <span>✦</span> Catering</a>
</nav>

<main>
  <span class="not-found-bg" aria-hidden="true">404</span>
  <div class="not-found-content">
    <span class="eyebrow">Erro 404</span>
    <h1 class="not-found-title">Página não<br>encontrada.</h1>
    <div class="gold-line" aria-hidden="true"></div>
    <p class="not-found-sub">A página que procura não existe ou foi movida. Regresse à página principal e continue a explorar o nosso trabalho.</p>
    <a href="index.html" class="btn-back">Voltar ao Início</a>
  </div>
</main>

<footer>
  <span>© 2026 Divinal Catering</span>
  <a href="index.html">divinalcatering.com</a>
</footer>

</body>
</html>
